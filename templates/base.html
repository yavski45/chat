<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-900">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MigChat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="h-full text-slate-100 antialiased flex flex-col overflow-hidden">

    <!-- ─── Navbar ─── -->
    <nav class="flex-shrink-0 bg-slate-800 border-b border-slate-700 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14 sm:h-16">
                <a href="/" class="text-indigo-400 font-bold text-xl tracking-tight">MigChat</a>
                <div class="flex items-center space-x-1 sm:space-x-3">
                    {% if user.is_authenticated %}
                        <a href="{% url 'inbox' %}" class="text-slate-300 hover:text-indigo-400 px-2 sm:px-3 py-2 rounded-md text-sm font-medium transition-colors">Messages</a>
                        <a href="{% url 'profile' %}" class="text-slate-300 hover:text-indigo-400 px-2 sm:px-3 py-2 rounded-md text-sm font-medium transition-colors hidden sm:inline">
                            {{ user.username }}
                        </a>
                        <a href="{% url 'profile' %}" class="sm:hidden">
                            <div class="h-8 w-8 rounded-full bg-indigo-600 flex items-center justify-center text-white text-sm font-bold">
                                {{ user.username|make_list|first|upper }}
                            </div>
                        </a>
                        <form action="{% url 'logout' %}" method="post" class="inline">
                            {% csrf_token %}
                            <button type="submit" class="text-slate-300 hover:text-indigo-400 px-2 sm:px-3 py-2 rounded-md text-sm font-medium transition-colors">Logout</button>
                        </form>
                    {% else %}
                        <a href="{% url 'login' %}" class="text-slate-300 hover:text-indigo-400 px-2 sm:px-3 py-2 rounded-md text-sm font-medium transition-colors">Login</a>
                        <a href="{% url 'signup' %}" class="bg-indigo-600 hover:bg-indigo-500 text-white px-3 sm:px-4 py-2 rounded-md text-sm font-medium transition-colors">Sign Up</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- ─── Main ─── -->
    <main class="flex-1 overflow-hidden {% block main_class %}max-w-7xl w-full mx-auto p-3 sm:p-4 lg:p-6{% endblock %}">
        {% if messages %}
            <div class="mb-4 space-y-2">
            {% for message in messages %}
                <div class="px-4 py-3 rounded-lg text-sm
                    {% if message.tags == 'error' %}bg-red-500/10 border border-red-500/20 text-red-400
                    {% else %}bg-emerald-500/10 border border-emerald-500/20 text-emerald-400{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>

</body>
</html>
