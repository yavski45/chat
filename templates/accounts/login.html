{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-slate-800 rounded-xl shadow-md overflow-hidden border border-slate-700 p-8 mt-10">
    <h2 class="text-2xl font-bold text-white mb-6">Login</h2>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div class="text-slate-300">
            {{ form.as_p }}
        </div>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2 px-4 rounded-lg transition-colors">Login</button>
    </form>
    <p class="mt-6 text-center text-sm text-slate-400">
        Don't have an account? <a href="{% url 'signup' %}" class="text-indigo-400 hover:text-indigo-300 font-medium transition-colors">Sign Up</a>
    </p>
</div>
<style>
    input { width: 100%; background-color: #0f172a; border: 1px solid #475569; border-radius: 0.375rem; padding: 0.5rem 0.75rem; color: #f1f5f9; margin-top: 0.25rem; }
    input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 1px #6366f1; }
</style>
{% endblock %}
