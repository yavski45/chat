{% extends 'base.html' %}
{% block content %}



<h2 class="text-2xl font-bold text-white mb-6">Create an Account</h2>

<form method="post" class="space-y-4">
    {% csrf_token %}


    {{ form.as_p }}


    <button type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2.5 px-4 rounded-lg transition-colors mt-2">
        Sign Up
    </button>
</form>

<p class="mt-6 text-center text-sm text-slate-400">
    Already have an account?
    <a href="{% url 'login' %}" class="text-indigo-400 hover:text-indigo-300 font-medium transition-colors">Login</a>
</p>


<style>
    input {
        width: 100%;
        background-color: #0f172a;
        border: 1px solid #475569;
        border-radius: 0.375rem;
        padding: 0.5rem 0.75rem;
        color: #f1f5f9;
        margin-top: 0.25rem;
        display: block;
    }

    input:focus {
        outline: none;
        border-color: #6366f1;
        box-shadow: 0 0 0 1px #6366f1;
    }

    .helptext {
        font-size: 0.75rem;
        color: #94a3b8;
        display: block;
        margin-top: 0.25rem;
    }
</style>
{% endblock %}
